<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" role="img" aria-label="Cubby app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#244a78"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- bin / tub body: a tapered tub seen straight-on -->
  <path d="M52 66 h76 l-7 60 a8 8 0 0 1 -8 7 H67 a8 8 0 0 1 -8 -7 Z"
        fill="#f6f4ef" opacity="0.96"/>
  <!-- tub rim -->
  <rect x="46" y="58" width="88" height="14" rx="7" fill="#fffdf9"/>
  <!-- handle cut-out -->
  <rect x="80" y="80" width="20" height="6" rx="3" fill="#1e3a5f" opacity="0.55"/>
  <!-- gold tag on a string, hung over the rim -->
  <line x1="119" y1="50" x2="124" y2="64" stroke="#d9a93f" stroke-width="3" stroke-linecap="round"/>
  <g transform="rotate(18 128 74)">
    <rect x="116" y="62" width="30" height="22" rx="4" fill="#b8860b"/>
    <circle cx="121" cy="67" r="2.4" fill="#1e3a5f"/>
    <rect x="121" y="73" width="20" height="2.6" rx="1.3" fill="#1e3a5f" opacity="0.6"/>
    <rect x="121" y="78" width="14" height="2.6" rx="1.3" fill="#1e3a5f" opacity="0.6"/>
  </g>
</svg>
